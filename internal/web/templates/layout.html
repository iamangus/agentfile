{{define "navbar"}}
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --uk-primary: oklch(59.1% 0.249 292.7);
    --uk-primary-f: oklch(100% 0 0);
    --uk-focus: oklch(66.6% 0.247 292.0);
  }
  .dark {
    --bg-base:    #0f0f11;
    --bg-sidebar: #0a0a0d;
    --bg-card:    #18181c;
    --border:     #27272a;
    --text-base:  #e4e4e7;
    --text-muted: #71717a;
    --purple:     oklch(59.1% 0.249 292.7);
    --purple-dim: oklch(59.1% 0.249 292.7 / 0.15);
    --purple-solid: #7c3aed;
  }
  html, body { margin: 0; height: 100%; font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg-base); color: var(--text-base); }
  .nav-bar {
    background: var(--bg-sidebar);
    border-bottom: 1px solid var(--border);
    min-height: 52px;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
  }
  .nav-brand {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none;
    flex-shrink: 0;
  }
  .nav-brand-icon {
    width: 28px; height: 28px; border-radius: 7px;
    background: var(--purple-dim);
    border: 1px solid oklch(59.1% 0.249 292.7 / 0.4);
    display: flex; align-items: center; justify-content: center;
  }
  .nav-brand-icon svg { width: 14px; height: 14px; color: var(--purple); }
  .nav-brand-text {
    font-size: 0.9rem; font-weight: 700;
    letter-spacing: -0.01em;
  }
  .nav-brand-agent { color: var(--text-base); }
  .nav-brand-file { color: var(--purple); }
  .nav-tabs {
    display: flex; align-items: center; gap: 2px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 3px;
  }
  .nav-tab {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    color: var(--text-muted);
    transition: background 0.12s, color 0.12s;
    border: 1px solid transparent;
  }
  .nav-tab:hover {
    background: var(--bg-sidebar);
    color: var(--text-base);
  }
  .nav-tab.active {
    background: var(--purple-dim);
    border-color: oklch(59.1% 0.249 292.7 / 0.25);
    color: var(--text-base);
  }
  .nav-tab svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }
</style>
<nav class="nav-bar">
  <a href="/" class="nav-brand">
    <div class="nav-brand-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09Z" />
      </svg>
    </div>
    <span class="nav-brand-text"><span class="nav-brand-agent">agent</span><span class="nav-brand-file">file</span></span>
  </a>

  <div class="nav-tabs">
    <a href="/chat" class="nav-tab {{if eq .ActivePage "chat"}}active{{end}}">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
      Chat
    </a>
    <a href="/agents" class="nav-tab {{if eq .ActivePage "agents"}}active{{end}}">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"></circle>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"></path>
      </svg>
      Agents
    </a>
    <a href="/tools" class="nav-tab {{if eq .ActivePage "tools"}}active{{end}}">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
      </svg>
      Tools
    </a>
  </div>
</nav>
{{end}}

{{define "agents.html"}}<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agents — agentfile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/frankenstyle@0.3.7/dist/css/frankenstyle-kit.min.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.3/sse.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/frankenstyle@0.3.7/dist/js/hwc-core.iife.js" type="module"></script>
  <style>
    :root {
      --uk-primary: oklch(59.1% 0.249 292.7);
      --uk-primary-f: oklch(100% 0 0);
      --uk-focus: oklch(66.6% 0.247 292.0);
    .dark {
      --bg-base:    #0f0f11;
      --bg-sidebar: #0a0a0d;
      --bg-card:    #18181c;
      --border:     #27272a;
      --text-base:  #e4e4e7;
      --text-muted: #71717a;
      --purple:     oklch(59.1% 0.249 292.7);
      --purple-dim: oklch(59.1% 0.249 292.7 / 0.15);
      --purple-solid: #7c3aed;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--bg-base); color: var(--text-base); }
    . .sidebar { background: var(--bg-sidebar); border-right: 1px solid var(--border); overflow: hidden;
      transition: width 0.2s ease, min-width 0.2s ease;
    }
    #sidebar-toggle:checked ~ .page-body .sidebar {
      width: 0; min-width: 0; border-right: none;
    }
    .sidebar-inner {
      display: flex; flex-direction: column; height: 100%;
    }

    .sidebar-toggle-btn {
      flex-shrink: 0; width: 30px; height: 30px; border-radius: 7px;
      border: 1px solid var(--border); background: var(--bg-card); color: var(--text-muted);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, color 0.12s,0 background: var(--purple-dim);
    }
    .sidebar-toggle-btn svg { width: 14px; height: 14px; pointer-events: none; }
    .sb-section-label {
      font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px;
    }
    .sb-nav { list-style: none; margin: 0; padding: 0; }
    .sb-nav li a {
      display: block; padding: 8px 10px; border-radius: 8px;
      text-decoration: none; color: inherit;
      transition: background 0.12s;
    }
    .sb-nav li.active a {      background: var(--purple-dim);
      border-color: oklch(59.1% 0.249 292.7 / 0.25); }
    .sb-nav li.active a:hover { background: var(--bg-card); color: var(--text-base); }
    .sb-nav li.active a {      background: var(--purple-dim);
      border-color: oklch(59.1% 0.249 292.7 / 0.25); }
    .sb-empty { padding: 8px 4px; color: #52525b; font-size: 0.82rem; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px;
    .sb-new-form { padding-top: 12px; border-top: 1px solid var(--border); margin-top: auto; }
    .sb-input {
      width: 100%; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text-base);
      font-family: inherit; font-size: 0.85rem;
      outline: none;
    }
    .sb-input::placeholder { color: #52525b; }
    .sb-submit {
      width: 100%; padding: 9px 16px; background: oklch(59.1% 0.249 292.7); border: none; border-radius: 8px;
      font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: opacity 0.15s, }
    .sb-submit:active { transform: scale(0.97); }
    .sb-submit svg { width: 14px; height: 14px; }
    .new-chat-btn {
      margin-top: auto;
 }
    .new-chat-btn svg { width: 14px; height: 14px; }
    .new-chat-btn {
      width: 100%; padding: 0 12px; border: none; border-radius: 8px; background: var(--purple-solid); color: #fff;
      font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: opacity 0.15s, }
    .new-chat-btn svg { width: 14px; height: 14px; }
    /* Chat */
  <div class="chat-content" .}}
{{end}}
